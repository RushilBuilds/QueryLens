[alembic]
# I'm using a placeholder URL here because the real connection string is injected
# at runtime from the DATABASE_URL environment variable in alembic/env.py. Storing
# credentials in alembic.ini would require a separate .env-aware wrapper script and
# makes CI configuration harder — env var injection is the standard pattern for
# containerised deployments.
script_location = alembic
sqlalchemy.url = postgresql+psycopg2://querylens:querylens@localhost:5432/querylens

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
